apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-deploy-991818161
  labels:
    app: probe-nginx
    student: "991818161"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probe-nginx
      student: "991818161"
  template:
    metadata:
      labels:
        app: probe-nginx
        student: "991818161"
    spec:
      containers:
      - name: nginx
        image: nginx:1.21-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10