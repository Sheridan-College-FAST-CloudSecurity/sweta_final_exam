apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web-sts-991818161
spec:
  replicas: 2
  serviceName: sts-headless-991818161
  selector:
    matchLabels:
      app: sts-web
      student: "991818161"
  template:
    metadata:
      labels:
        app: sts-web
        student: "991818161"
    spec:
      initContainers:
      - name: seed-html
        image: busybox:1.28
        command: ["sh", "-c"]
        args: ['echo "hello from $(hostname) for 991818161" > /usr/share/nginx/html/index.html']
        volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html
      containers:
      - name: nginx
        image: nginx:1.21-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
  - metadata:
      name: web-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 200Mi